name: TileMapper
version: '${project.version}'
main: com.mndk.tilemapper.TileMapper
api-version: '1.21'
prefix: TSM
load: STARTUP

dependencies:
  server:
    Terraplusminus:
      load: BEFORE
      required: true
      join-classpath: true

permissions:
  tilemapper.admin:
    description: Allows using /tsm admin commands (reload, status, sources, source, blocksets, blockset)
    default: op
  tilemapper.player:
    description: Allows using /tsm generate to create tile planes in a WorldEdit selection
    default: true
